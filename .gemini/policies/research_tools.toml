# Разрешаем инструменты поиска и чтения кода
[[rule]]
toolName = [
    "read_file", 
    "grep_search", 
    "glob", 
    "list_directory",
    "mcp_roslyn_get_symbol_info",
    "mcp_roslyn_find_references",
    "mcp_roslyn_go_to_definition",
    "mcp_roslyn_find_implementations",
    "mcp_roslyn_find_callers",
    "mcp_roslyn_get_diagnostics",
    "mcp_roslyn_get_document_outline",
    "mcp_roslyn_get_type_hierarchy",
    "mcp_roslyn_get_code_metrics",
    "mcp_roslyn_diagnose",
    "mcp_context7_query-docs",
    "mcp_context7_resolve-library-id",
    "mcp_sequential-thinking_sequentialthinking"
]
decision = "allow"
priority = 200

# Всегда спрашиваем разрешение на изменение файлов и выполнение команд
[[rule]]
toolName = ["write_file", "replace", "run_shell_command"]
decision = "ask_user"
priority = 200
